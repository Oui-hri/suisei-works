<body>
  <video class="site-bg" autoplay muted loop playsinline>

    <h1>Suisei Works</h1>

  <section class="hero">
    <div class="hero-curtain" aria-hidden="true">

    <div class="hero-lights" aria-hidden="true">
      <img src="images/moon-decoration.png" alt="" class="moon-decoration">

          <span class="light-cord"></span>

        </div>
      </div>

      <div class="hanging-light light-2">

      </div>

      <div class="hanging-light light-3">
        <div class="light-swing">
          <span class="light-cord"></span>
          <span class="round-light"></span>

      </div>

      <div class="hanging-light light-4 main-light">
        <div class="light-swing">
          <span class="light-cord"></span>
          <img src="images/main-star-light.png" alt="" class="light-image main-star-image">

      </div>

      <div class="hanging-light light-5">
        <div class="light-swing">
          <span class="light-cord"></span>

      <div class="hanging-light light-6">
        <div class="light-swing">
          <span class="light-cord"></span>
          <img src="images/light-star.png" alt="" class="light-image light-star-image">
        </div>
      </div>

      <div class="hanging-light light-7">
        <div class="light-swing">
          <span class="light-cord"></span>
          <img src="images/light-bulb.png" alt="" class="light-image light-bulb-image">
        </div>
      </div>
    </div>

    <div class="hero-content">
      <p class="hero-label">Suisei Works</p>

      <h2 class="hero-title">
          <span>青く澄んだ世界観で、伝わる表現を。</span>
        </h2>
  </section>
  <section class="hero-no-text fade-in">
    <div class="hero naiyou">
          <p class="hero-text">
                    動画編集・デザイン・イラストを通して、<br>
                    見る人に届くビジュアルを形にしています。
                  </p>

          <a class="hero-button" href="works.html">Worksを見る</a>

      </p>

    <div class="top-guide-buttons">
      <a href="works.html">
        Worksを見る
      </a>
      <a href="about.html">
        Aboutを見る
      </a>
    </div>
  </section>
